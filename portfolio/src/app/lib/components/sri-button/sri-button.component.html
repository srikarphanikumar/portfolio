<ng-container *ngIf="btnType === 'primary'">
  <button mat-raised-button type="button" color="primary" [disabled]="disabled">
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </button>
</ng-container>

<ng-container *ngIf="btnType === 'secondary'">
  <button mat-stroked-button type="button" color="primary" [disabled]="disabled">
    <ng-container *ngTemplateOutlet="content"></ng-container>
  </button>
</ng-container>

<ng-container *ngIf="btnType === 'tertiary'">
  <button mat-button 
    type="button" 
    color="primary" 
    [disableRipple]="false" 
    [disabled]="!!disabled">
      <ng-container *ngTemplateOutlet="content"></ng-container>
  </button>
</ng-container>


<ng-template #content>
  <ng-content></ng-content>
</ng-template>
