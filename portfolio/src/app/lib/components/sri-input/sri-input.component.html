<mat-form-field class="example-full-width">
  <mat-label>{{ label }}</mat-label>
  <input matInput
    [name]="formControlName"
    [formControlName]="formControlName"
    [placeholder]="placeholder" 
    [value]="value"
    [maxLength]="maxLength"
    [readonly]="readonly"
    (blur)="onBlurMethod($event)">
    <ng-content></ng-content>
</mat-form-field>
